
server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/example_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: admin
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# JWT配置
jwt:
  secret: volunteer-management-system-jwt-secret-key-2024
  expiration: 86400000

# 日志配置
logging:
  level:
    com.example.volunteer: DEBUG
    org.springframework.security: INFO
